name: Deploy Firebase Hosting and Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install app dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Firebase Functions dependencies
        run: npm --prefix functions install

      - name: Deploy Hosting and Functions
        uses: w9jds/firebase-action@v13.29.0
        with:
          args: deploy --only hosting,functions --project dungeon-calendar-app
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DUNGEON_CALENDAR_APP }}
